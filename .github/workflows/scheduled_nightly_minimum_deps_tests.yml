name: Newton + Minimum Dependency Versions

# This workflow runs weekly to test Newton with the lowest compatible versions
# of direct PyPI dependencies (as specified by version floors in pyproject.toml).
# It uses `uv lock --resolution lowest-direct` to resolve direct dependencies
# to their minimum supported versions while letting transitive dependencies
# resolve normally, catching cases where the codebase has drifted to depend on
# features only available in newer releases of its direct dependencies.
# Scheduled workflows automatically run on the default branch (main).

env:
  PYTHONFAULTHANDLER: "1" # Dump tracebacks on fatal signals (SIGSEGV, SIGABRT, etc.)

on:
  schedule:
    - cron: '0 13 * * 1'  # Weekly on Monday at 1 PM UTC (5 AM PST)
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: read

jobs:
  minimum-deps-tests:
    name: Run Tests with minimum dependency versions
    if: github.repository == 'newton-physics/newton'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.9.0"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Resolve minimum dependency versions
        run: |
          uv lock --resolution lowest-direct
          echo "Resolved dependency versions:"
          uv tree --depth 1

      - name: Run Tests
        run: uv run --extra dev -m newton.tests --junit-report-xml rspec.xml

      - name: Test Summary
        if: ${{ !cancelled() }}
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86  # v2.4
        with:
          paths: "rspec.xml"
          show: "fail"
